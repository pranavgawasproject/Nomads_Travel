version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: roamiq-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: roamiq
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - roamiq-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roamiq-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - roamiq-network

  # Frontend (NGINX)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roamiq-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - roamiq-network

volumes:
  mongo_data:

networks:
  roamiq-network:
    driver: bridge

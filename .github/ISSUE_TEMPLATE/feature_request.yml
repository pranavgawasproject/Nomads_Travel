name: 💡 Feature Request
description: Suggest a new feature or improvement for RoamIQ
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 💡 Feature Description
        Describe the feature you'd like to see and the problem it solves.

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "How should this feature work? Include any sketches, mockups, or references."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "What other solutions did you consider?"

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Any other context, research, or links related to this feature."